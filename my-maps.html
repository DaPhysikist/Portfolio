<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav Mehta - My Maps</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --card-bg: #fff;
            --border-color: #ddd;
            --primary-color: #007bff;
            --link-hover: #0056b3;
            --shadow-light: 0 4px 12px rgba(0,0,0,0.08);
            --node-shadow: 0 2px 10px rgba(0,123,255,0.18);
            --toolbar-bg: #ffffff;
            --sidebar-bg: #ffffff;
        }
        .dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f4f4f4;
            --card-bg: #2b2b2b;
            --border-color: #444;
            --primary-color: #1e90ff;
            --link-hover: #4dabff;
            --shadow-light: 0 4px 12px rgba(0,0,0,0.4);
            --node-shadow: 0 2px 10px rgba(30,144,255,0.2);
            --toolbar-bg: #232323;
            --sidebar-bg: #232323;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            background-color: var(--card-bg);
            box-shadow: var(--shadow-light);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            z-index: 100;
        }
        .main-nav { display: flex; align-items: center; gap: 1rem; }
        .header-icon { width: 36px; height: 36px; border-radius: 50%; }
        .nav-link { text-decoration: none; color: var(--text-color); font-weight: 700; transition: color 0.3s; }
        .nav-link:hover { color: var(--primary-color); }
        #theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-color); }
        #theme-toggle:hover { color: var(--primary-color); }

        /* ── Layout ── */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Map tabs sidebar ── */
        .map-sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--toolbar-bg);
            border-right: 1px solid var(--border-color);
            padding: 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin: 0 0 0.5rem;
        }
        .map-tab {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            transition: background 0.15s, color 0.15s;
            text-align: left;
            width: 100%;
        }
        .map-tab:hover { background: var(--bg-color); }
        .map-tab.active { background: rgba(0,123,255,0.1); color: var(--primary-color); font-weight: 700; }
        .map-tab i { font-size: 10px; opacity: 0.5; }

        /* ── Canvas ── */
        .canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-color);
            background-image: radial-gradient(circle, var(--border-color) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        #canvas-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        #nodes-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: 0 0;
            z-index: 2;
        }

        /* ── Node ── */
        .node {
            position: absolute;
            border-radius: 12px;
            padding: 10px 14px;
            min-width: 130px;
            max-width: none;
            cursor: pointer;
            user-select: none;
            transition: box-shadow 0.15s, transform 0.1s;
            z-index: 2;
        }
        .node:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15) !important; }
        .node.selected { box-shadow: 0 0 0 3px rgba(0,123,255,0.3) !important; }
        .node-title { font-weight: 700; font-size: 13px; margin: 0 0 2px; }
        
        /* Markdown / Content Overrides */
        .node-desc, .info-desc {
            font-size: 11px; color: #888; margin: 0;
            overflow: hidden;
            white-space: normal;
            word-wrap: break-word;
        }
        .node-desc h1, .node-desc h2, .node-desc h3, .info-desc h1, .info-desc h2, .info-desc h3 { margin: 4px 0; font-size: 1.1em; color: var(--text-color); }
        .node-desc p, .info-desc p { margin: 4px 0; }
        .node-desc ul, .node-desc ol, .info-desc ul, .info-desc ol { margin: 4px 0; padding-left: 16px; }
        .node-desc blockquote, .info-desc blockquote { border-left: 2px solid var(--primary-color); margin: 4px 0; padding-left: 6px; color: #666; }
        .node-desc pre, .info-desc pre { background: rgba(0,0,0,0.05); padding: 4px; border-radius: 4px; overflow-x: auto; font-family: monospace; }
        .node-desc code, .info-desc code { background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
        .node-desc img, .info-desc img { max-width: 100%; border-radius: 4px; }
        .node-desc hr, .info-desc hr { border: none; border-top: 1px solid var(--border-color); margin: 8px 0; }
        .node-desc table, .info-desc table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 11px; }
        .node-desc th, .node-desc td, .info-desc th, .info-desc td { border: 1px solid var(--border-color); padding: 4px 6px; }
        .node-desc th, .info-desc th { background: rgba(0,0,0,0.05); font-weight: 700; color: var(--text-color); }
        .node-desc::-webkit-scrollbar, .info-desc::-webkit-scrollbar { width: 4px; }
        .node-desc::-webkit-scrollbar-thumb, .info-desc::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        .node-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
        .node-tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; }

        /* ── Grouping Regions ── */
        .node.region {
            z-index: 1;
            border-style: dashed !important;
            background: rgba(0, 123, 255, 0.03) !important;
            box-shadow: none !important;
            cursor: default;
        }
        .node.region:hover { transform: none; box-shadow: none !important; }
        .dark-mode .node.region { background: rgba(30, 144, 255, 0.05) !important; }
        .node.region .node-title {
            font-size: 16px !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.5;
        }

        /* ── Sub-Map Badge ── */
        .node-submap-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #28a745;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            z-index: 15;
            transition: transform 0.15s, background 0.15s;
        }
        .node-submap-badge:hover {
            transform: scale(1.15);
            background: #218838;
        }

        /* ── Info panel ── */
        .info-panel {
            width: 320px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .info-panel.hidden { display: none; }
        .info-header {
            padding: 1.25rem 1rem 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }
        .info-header h2 { margin: 0; font-size: 16px; font-weight: 700; }
        .info-header .info-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .info-body { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .info-section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #888;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .info-desc {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-color);
        }
        .info-links { display: flex; flex-direction: column; gap: 5px; }
        .info-link {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 7px;
            background: var(--bg-color);
            text-decoration: none;
            color: var(--primary-color);
            font-size: 12px;
            transition: background 0.15s;
            overflow: hidden;
        }
        .info-link:hover { background: rgba(0,123,255,0.08); }
        .info-link span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info-files { display: flex; flex-direction: column; gap: 5px; }
        .info-file {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 7px;
            background: var(--bg-color);
            font-size: 12px;
        }
        .info-connections { display: flex; flex-direction: column; gap: 5px; }
        .info-conn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-family: 'Roboto', sans-serif;
            transition: background 0.15s;
        }
        .info-conn i { font-size: 8px; }

        /* ── Zoom controls ── */
        .zoom-controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 50;
        }
        .zoom-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .zoom-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        /* ── Loading / empty states ── */
        .center-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #aaa;
            pointer-events: none;
            z-index: 100;
        }
        .center-message i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.4; }
        .center-message p { font-size: 13px; margin: 0; }
        .center-message a { color: var(--primary-color); pointer-events: all; }

        /* ── View-only badge & Breadcrumbs ── */
        .view-badge {
            position: absolute;
            top: 12px; left: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #888;
            z-index: 50;
            pointer-events: none;
        }
        .breadcrumb-wrap {
            position: absolute;
            top: 42px; left: 12px;
            z-index: 50;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .breadcrumb-btn {
            padding: 4px 10px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-light);
            color: var(--text-color);
            transition: all 0.15s;
        }
        .breadcrumb-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .breadcrumb-sep { font-size: 10px; color: #888; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        
        /* Modern Button Override for Upload */
        .btn-upload {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-color);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            pointer-events: all;
            margin-top: 15px;
            transition: opacity 0.2s;
        }
        .btn-upload:hover { opacity: 0.85; }
    </style>
</head>

<script>
// ─────────────────────────────────────────────
//  MARKDOWN PARSER & CUSTOM EXTENSIONS
// ─────────────────────────────────────────────
let currentRenderingNodeId = null;
const desmosGraphs = [];
const circuitDrawers = [];

if (window.marked) {
    const customRenderer = {
        code(code, lang, escaped) {
            if (lang === 'desmos') {
                const id = `desmos-${Math.random().toString(36).substr(2, 9)}`;
                desmosGraphs.push({ id, expressions: code.split('\n') });
                return `<div id="${id}" class="desmos-embed" style="width: 100%; height: 300px; margin: 10px 0; border-radius: 4px; overflow: hidden; border: 1px solid var(--border-color);"></div>\n`;
            }
            if (lang && lang.startsWith('circuit')) {
                const title = lang.substring(7).trim() || 'Circuit Schematic';
                const id = `circuit-${Math.random().toString(36).substr(2, 9)}`;
                circuitDrawers.push(id);
                return `<div class="circuit-container" style="border: 1px solid var(--border-color); padding: 8px; border-radius: 4px; margin: 10px 0; background: #fff;">
                    <div style="font-size:12px; font-weight:bold; margin-bottom:6px; color:var(--text-color); font-family:sans-serif; display:flex; justify-content:space-between;">
                        <span>${escHtml(title)}</span>
                    </div>
                    <canvas id="${id}" data-node-id="${currentRenderingNodeId}" width="450" height="300" style="background:#fcfcfc; border:1px solid #ccc; width: 100%; max-width: 100%;"></canvas>
                </div>\n`;
            }
            return false;
        },
        link(href, title, text) {
            if (href.includes('diagrams.net') || href.includes('draw.io')) {
                let embedUrl = href.replace('calc.html', 'index.html');
                return `<div class="drawio-embed" style="position:relative; padding-bottom:60%; height:0; overflow:hidden; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 4px;">
                    <iframe src="${embedUrl}&embed=1" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" allowfullscreen></iframe>
                </div>\n`;
            }
            return false;
        }
    };
    marked.use({ renderer: customRenderer });
}

function renderMarkdown(text, nodeId) {
    if (!text) return '';
    currentRenderingNodeId = nodeId;
    let html = text;
    
    html = html.replace(/!\[video\]\((.*?)\)/gi, '<video controls style="max-width:100%; margin:4px 0;"><source src="$1"></video>');
    html = html.replace(/!\[audio\]\((.*?)\)/gi, '<audio controls style="max-width:100%; margin:4px 0;"><source src="$1"></audio>');
    html = html.replace(/!\[(?:embed|pdf|ppt)\]\((.*?)\)/gi, '<iframe src="$1" style="width:100%; height:150px; border:1px solid var(--border-color); border-radius:4px; margin:4px 0;" allowfullscreen></iframe>');

    const mathBlocks = [];
    html = html.replace(/\$\$([\s\S]*?)\$\$/g, (match) => {
        mathBlocks.push(match);
        return `@@MATH_BLOCK_${mathBlocks.length - 1}@@`;
    });
    html = html.replace(/\$([^$\n]+?)\$/g, (match) => {
        mathBlocks.push(match);
        return `@@MATH_BLOCK_${mathBlocks.length - 1}@@`;
    });

    if (window.marked) {
        html = marked.parse(html);
    }

    mathBlocks.forEach((block, i) => {
        html = html.replace(`@@MATH_BLOCK_${i}@@`, () => escHtml(block));
    });

    currentRenderingNodeId = null;
    return html;
}

function postRenderInit() {
    if (window.renderMathInElement) {
        const conf = { delimiters: [ {left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false} ], throwOnError: false };
        const nl = document.getElementById('nodes-layer');
        const ip = document.getElementById('info-panel');
        if (nl) renderMathInElement(nl, conf);
        if (ip) renderMathInElement(ip, conf);
    }
    
    // Initialize Desmos
    desmosGraphs.forEach(graph => {
        const element = document.getElementById(graph.id);
        if (element && !element.dataset.initialized) {
            element.dataset.initialized = 'true';
            const nodeEl = element.closest('.node');
            if (nodeEl) {
                const nodeId = nodeEl.id.replace('node-', '');
                const node = currentMap().nodes[nodeId];
                let changed = false;
                if (node.width < 400) { node.width = 400; changed = true; }
                if (node.height < 450) { node.height = 450; changed = true; }
                if (changed) {
                    nodeEl.style.width = node.width + 'px';
                    nodeEl.style.minHeight = node.height + 'px';
                }
            }
            element.addEventListener('mousedown', e => e.stopPropagation());
            element.addEventListener('touchstart', e => e.stopPropagation(), {passive: false});

            if (window.Desmos) {
                const calculator = Desmos.GraphingCalculator(element, { expressionsPixelRatio: 2 });
                graph.expressions.forEach((expr, i) => {
                    if (expr.trim()) calculator.setExpression({ id: 'graph'+i, latex: expr });
                });
            }
        }
    });
    desmosGraphs.length = 0;

    // Initialize Circuit Drawers (Read-Only Mode)
    circuitDrawers.forEach(id => {
        const canvas = document.getElementById(id);
        if (!canvas || canvas.dataset.initialized) return;
        canvas.dataset.initialized = 'true';

        let elements = [];
        const GRID = 20;

        const nodeId = canvas.dataset.nodeId;
        const node = nodeId ? currentMap().nodes[nodeId] : null;

        if (node) {
            const nodeEl = canvas.closest('.node');
            if (nodeEl) {
                let changed = false;
                if (node.width < 500) { node.width = 500; changed = true; }
                if (node.height < 450) { node.height = 450; changed = true; }
                if (changed) {
                    nodeEl.style.width = node.width + 'px';
                    nodeEl.style.minHeight = node.height + 'px';
                }
            }
            
            if (node.circuitData) {
                const parent = canvas.closest('.node') || canvas.closest('.info-body');
                if (parent) {
                    const canvases = Array.from(parent.querySelectorAll('canvas[id^="circuit-"]'));
                    const cIdx = canvases.indexOf(canvas);
                    if (node.circuitData[cIdx]) elements = node.circuitData[cIdx];
                }
            }
        }

        const ctx = canvas.getContext('2d');

        function drawShape(ctx, type, label) {
            ctx.beginPath();
            if (type === 'R') {
                ctx.moveTo(-20, 0); ctx.lineTo(-15, 0);
                ctx.lineTo(-10, -8); ctx.lineTo(0, 8);
                ctx.lineTo(10, -8); ctx.lineTo(15, 0);
                ctx.lineTo(20, 0); ctx.stroke();
            } else if (type === 'C') {
                ctx.moveTo(-15, 0); ctx.lineTo(-4, 0);
                ctx.moveTo(15, 0); ctx.lineTo(4, 0);
                ctx.moveTo(-4, -12); ctx.lineTo(-4, 12);
                ctx.moveTo(4, -12); ctx.lineTo(4, 12);
                ctx.stroke();
            } else if (type === 'L') {
                ctx.moveTo(-20, 0); ctx.lineTo(-15, 0);
                for(let i=0; i<3; i++) ctx.arc(-10 + (i*10), 0, 5, Math.PI, 0);
                ctx.lineTo(20, 0); ctx.stroke();
            } else if (type === 'D') {
                ctx.moveTo(-8, -8); ctx.lineTo(-8, 8); ctx.lineTo(8, 0); ctx.closePath();
                ctx.stroke();
                ctx.beginPath(); ctx.moveTo(8, -8); ctx.lineTo(8, 8); ctx.stroke();
            } else if (type === 'Z') {
                ctx.moveTo(-8, -8); ctx.lineTo(-8, 8); ctx.lineTo(8, 0); ctx.closePath();
                ctx.stroke();
                ctx.beginPath(); 
                ctx.moveTo(12, -8); ctx.lineTo(8, -8); ctx.lineTo(8, 8); ctx.lineTo(4, 8);
                ctx.stroke();
            } else if (type === 'Q') {
                ctx.moveTo(-15, 0); ctx.lineTo(-5, 0); 
                ctx.moveTo(-5, -10); ctx.lineTo(-5, 10); 
                ctx.moveTo(-5, -5); ctx.lineTo(5, -15); ctx.lineTo(5, -20); 
                ctx.moveTo(-5, 5); ctx.lineTo(5, 15); ctx.lineTo(5, 20); 
                ctx.stroke();
                ctx.beginPath(); ctx.moveTo(5, 15); ctx.lineTo(2, 10); ctx.lineTo(0, 14); ctx.fill(); 
            } else if (type === 'F') {
                ctx.moveTo(-15, 0); ctx.lineTo(-5, 0); 
                ctx.moveTo(-5, -10); ctx.lineTo(-5, 10); 
                ctx.moveTo(-2, -10); ctx.lineTo(-2, -3); 
                ctx.moveTo(-2, -2); ctx.lineTo(-2, 2);   
                ctx.moveTo(-2, 3); ctx.lineTo(-2, 10);   
                ctx.moveTo(-2, -6); ctx.lineTo(10, -6); ctx.lineTo(10, -20); 
                ctx.moveTo(-2, 6); ctx.lineTo(10, 6); ctx.lineTo(10, 20); 
                ctx.moveTo(-2, 0); ctx.lineTo(10, 0); ctx.lineTo(10, 6); 
                ctx.stroke();
                ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(6, -3); ctx.lineTo(6, 3); ctx.fill(); 
            } else if (type === 'E') {
                ctx.moveTo(-15, 0); ctx.lineTo(-10, 0); 
                ctx.stroke();
                ctx.beginPath(); ctx.arc(-7.5, 0, 2.5, 0, 2*Math.PI); ctx.stroke(); 
                ctx.beginPath();
                ctx.moveTo(-5, -10); ctx.lineTo(-5, 10); 
                ctx.moveTo(-2, -10); ctx.lineTo(-2, -3); 
                ctx.moveTo(-2, -2); ctx.lineTo(-2, 2);   
                ctx.moveTo(-2, 3); ctx.lineTo(-2, 10);   
                ctx.moveTo(-2, -6); ctx.lineTo(10, -6); ctx.lineTo(10, -20); 
                ctx.moveTo(-2, 6); ctx.lineTo(10, 6); ctx.lineTo(10, 20); 
                ctx.moveTo(-2, 0); ctx.lineTo(10, 0); ctx.lineTo(10, 6); 
                ctx.stroke();
                ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(2, -3); ctx.lineTo(2, 3); ctx.fill(); 
            } else if (type === 'O') {
                ctx.arc(0, 0, 12, 0, 2*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-6, 0);
                ctx.quadraticCurveTo(-3, -6, 0, 0);
                ctx.quadraticCurveTo(3, 6, 6, 0); ctx.stroke();
            } else if (type === 'I') {
                ctx.arc(0, 0, 12, 0, 2*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 7); ctx.lineTo(0, -7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-3, -3); ctx.lineTo(0, -7); ctx.lineTo(3, -3); ctx.stroke();
            } else if (type === 'V') {
                ctx.arc(0, 0, 12, 0, 2*Math.PI); ctx.stroke();
                ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('+', 0, -5); ctx.fillText('-', 0, 5);
            } else if (type === 'J') {
                ctx.moveTo(0, -14); ctx.lineTo(14, 0); ctx.lineTo(0, 14); ctx.lineTo(-14, 0); ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 7); ctx.lineTo(0, -7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-3, -3); ctx.lineTo(0, -7); ctx.lineTo(3, -3); ctx.stroke();
            } else if (type === 'U') {
                ctx.moveTo(0, -14); ctx.lineTo(14, 0); ctx.lineTo(0, 14); ctx.lineTo(-14, 0); ctx.closePath(); ctx.stroke();
                ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('+', 0, -5); ctx.fillText('-', 0, 5);
            } else if (type === 'B') {
                ctx.moveTo(-6, -12); ctx.lineTo(-6, 12);
                ctx.moveTo(-2, -6);  ctx.lineTo(-2, 6);
                ctx.moveTo(2, -12);  ctx.lineTo(2, 12);
                ctx.moveTo(6, -6);   ctx.lineTo(6, 6); ctx.stroke();
            } else if (type === 'G') {
                ctx.moveTo(0, -10); ctx.lineTo(0, 0);
                ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
                ctx.moveTo(-6, 4); ctx.lineTo(6, 4);
                ctx.moveTo(-2, 8); ctx.lineTo(2, 8); ctx.stroke();
            } else if (type === 'P') {
                ctx.moveTo(-15, -15); ctx.lineTo(15, 0); ctx.lineTo(-15, 15); ctx.closePath();
                ctx.stroke();
                ctx.font = '10px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillText('+', -12, -7); ctx.fillText('-', -12, 7);
            } else if (type === 'A') {
                ctx.moveTo(0, 10); ctx.lineTo(0, -5); ctx.lineTo(-8, -15);
                ctx.moveTo(0, -5); ctx.lineTo(8, -15);
                ctx.moveTo(0, -5); ctx.lineTo(0, -15); ctx.stroke();
            } else if (type === 'M') {
                ctx.font = '12px sans-serif';
                const w = Math.max(40, ctx.measureText(label || 'IC').width + 16);
                ctx.fillStyle = '#fff';
                ctx.fillRect(-w/2, -15, w, 30);
                ctx.strokeRect(-w/2, -15, w, 30);
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(label || 'IC', 0, 0);
            } else if (type === 'N') {
                ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
                ctx.fillText(label || 'NET', 4, -4);
            } else if (type === '1') {
                ctx.moveTo(-10, -10); ctx.lineTo(0, -10); ctx.arc(0, 0, 10, -Math.PI/2, Math.PI/2); ctx.lineTo(-10, 10); ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-15, -5); ctx.lineTo(-10, -5); ctx.moveTo(-15, 5); ctx.lineTo(-10, 5); ctx.moveTo(10, 0); ctx.lineTo(15, 0); ctx.stroke();
            } else if (type === '2') {
                ctx.moveTo(-10, -12); ctx.quadraticCurveTo(5, -12, 15, 0); ctx.quadraticCurveTo(5, 12, -10, 12); ctx.quadraticCurveTo(0, 0, -10, -12); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-15, -5); ctx.lineTo(-6, -5); ctx.moveTo(-15, 5); ctx.lineTo(-6, 5); ctx.moveTo(15, 0); ctx.lineTo(20, 0); ctx.stroke();
            } else if (type === '3') {
                ctx.moveTo(-10, -10); ctx.lineTo(6, 0); ctx.lineTo(-10, 10); ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.arc(9, 0, 3, 0, 2*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-10, 0); ctx.moveTo(12, 0); ctx.lineTo(17, 0); ctx.stroke();
            } else if (type === '4') {
                ctx.moveTo(-12, -10); ctx.lineTo(-2, -10); ctx.arc(-2, 0, 10, -Math.PI/2, Math.PI/2); ctx.lineTo(-12, 10); ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.arc(11, 0, 3, 0, 2*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-17, -5); ctx.lineTo(-12, -5); ctx.moveTo(-17, 5); ctx.lineTo(-12, 5); ctx.moveTo(14, 0); ctx.lineTo(19, 0); ctx.stroke();
            } else if (type === '5') {
                ctx.moveTo(-12, -12); ctx.quadraticCurveTo(3, -12, 13, 0); ctx.quadraticCurveTo(3, 12, -12, 12); ctx.quadraticCurveTo(-2, 0, -12, -12); ctx.stroke();
                ctx.beginPath(); ctx.arc(16, 0, 3, 0, 2*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-17, -5); ctx.lineTo(-8, -5); ctx.moveTo(-17, 5); ctx.lineTo(-8, 5); ctx.moveTo(19, 0); ctx.lineTo(24, 0); ctx.stroke();
            } else if (type === '6') {
                ctx.moveTo(-8, -12); ctx.quadraticCurveTo(7, -12, 17, 0); ctx.quadraticCurveTo(7, 12, -8, 12); ctx.quadraticCurveTo(2, 0, -8, -12); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-12, -12); ctx.quadraticCurveTo(-2, 0, -12, 12); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-17, -5); ctx.lineTo(-7, -5); ctx.moveTo(-17, 5); ctx.lineTo(-7, 5); ctx.moveTo(17, 0); ctx.lineTo(22, 0); ctx.stroke();
            } else if (type === '7') {
                ctx.moveTo(-10, -12); ctx.quadraticCurveTo(5, -12, 15, 0); ctx.quadraticCurveTo(5, 12, -10, 12); ctx.quadraticCurveTo(0, 0, -10, -12); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-14, -12); ctx.quadraticCurveTo(-4, 0, -14, 12); ctx.stroke();
                ctx.beginPath(); ctx.arc(18, 0, 3, 0, 2*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-19, -5); ctx.lineTo(-9, -5); ctx.moveTo(-19, 5); ctx.lineTo(-9, 5); ctx.moveTo(21, 0); ctx.lineTo(26, 0); ctx.stroke();
            }
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ddd';
        for (let x = 0; x <= canvas.width; x += GRID) {
            for (let y = 0; y <= canvas.height; y += GRID) {
                ctx.fillRect(x - 1, y - 1, 2, 2);
            }
        }

        elements.forEach(el => {
            ctx.strokeStyle = '#000'; ctx.fillStyle = '#000';
            ctx.lineWidth = 2; ctx.lineJoin = 'round';

            if (el.type === 'W') {
                ctx.beginPath();
                ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
                ctx.beginPath(); ctx.arc(el.x1, el.y1, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(el.x2, el.y2, 2.5, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.save();
                ctx.translate(el.x, el.y);
                ctx.rotate((el.rot || 0) * Math.PI / 180);
                drawShape(ctx, el.type, el.label);
                ctx.restore();
            }
        });
    });
    circuitDrawers.length = 0;
}

// ─────────────────────────────────────────────
//  COLORS (must match editor)
// ─────────────────────────────────────────────
const COLORS = {
    blue:   { border: '#007bff', bg: '#e8f4ff', dark_border: '#1e90ff', dark_bg: '#1a2d40' },
    green:  { border: '#28a745', bg: '#e8f9ed', dark_border: '#2fba54', dark_bg: '#1a2e1e' },
    orange: { border: '#fd7e14', bg: '#fff3e0', dark_border: '#ff9a3c', dark_bg: '#2e1f0a' },
    red:    { border: '#e74c3c', bg: '#fdecea', dark_border: '#e74c3c', dark_bg: '#2e1212' },
    purple: { border: '#6f42c1', bg: '#f0ebff', dark_border: '#9b72e8', dark_bg: '#221840' },
    teal:   { border: '#20c997', bg: '#e0faf3', dark_border: '#20c997', dark_bg: '#102d25' },
    gray:   { border: '#6c757d', bg: '#f3f4f5', dark_border: '#9aa0a6', dark_bg: '#252525' },
};

const DASH_MAP = {
    solid:    'none',
    dotted:   '2,4',
    dashed:   '8,5',
    longdash: '16,5',
    dashdot:  '10,4,2,4',
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let mapData = null;
let currentMapId = null;
let selectedNodeId = null;
let transform = { x: 0, y: 0, scale: 1 };

// ─────────────────────────────────────────────
//  LOAD (Fixed: Prioritizes map-data.json, falls back to Live Sync)
// ─────────────────────────────────────────────
async function loadData() {
    showMessage('<i class="fas fa-spinner fa-spin"></i>', 'Loading maps…');
    let loadedFromFile = false;

    try {
        const res = await fetch('map-data.json?_=' + Date.now());
        if (res.ok) {
            const raw = await res.json();
            if (raw.maps) {
                mapData = raw;
                loadedFromFile = true;
            } else if (raw.nodes && raw.edges) {
                const id = 'map_default';
                mapData = { maps: { [id]: { name: raw.name || 'My Concepts', nodes: raw.nodes, edges: raw.edges } } };
                loadedFromFile = true;
            }
        }
    } catch(e) {
        console.log("Fetch failed (likely due to local file:// protocol blocking). Checking local storage...");
    }

    if (!loadedFromFile) {
        const draft = localStorage.getItem('cm_state');
        if (draft) {
            try {
                const parsed = JSON.parse(draft);
                if (parsed.maps && Object.keys(parsed.maps).length > 0) {
                    mapData = parsed;
                }
            } catch(e) {}
        }
    }

    if (mapData && mapData.maps && Object.keys(mapData.maps).length > 0) {
        hideMessage();
        const ids = Object.keys(mapData.maps);
        renderMapTabs();
        switchMap(ids[0]);
    } else {
        document.getElementById('center-msg-text').innerHTML = `Cannot automatically read map-data.json (browsers block local file access).<br><br>Please select your file manually:`;
        document.getElementById('manual-upload-btn').style.display = 'inline-flex';
    }
}

function showMessage(icon, text) {
    const el = document.getElementById('center-msg');
    el.style.display = 'block';
    el.innerHTML = `<i class="${icon}" style="font-size:2.5rem;display:block;margin-bottom:0.5rem;opacity:0.4"></i><p id="center-msg-text" style="font-size:13px;margin:0">${text}</p>`;
}
function hideMessage() { document.getElementById('center-msg').style.display = 'none'; }

function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const raw = JSON.parse(e.target.result);
            if (raw.maps) { mapData = raw; }
            else if (raw.nodes && raw.edges) {
                const id = 'map_default';
                mapData = { maps: { [id]: { name: raw.name || file.name, nodes: raw.nodes, edges: raw.edges } } };
            } else throw new Error('Invalid format');
            
            const ids = Object.keys(mapData.maps);
            hideMessage();
            renderMapTabs();
            switchMap(ids[0]);
        } catch { alert('Could not parse JSON file.'); }
    };
    reader.readAsText(file);
}

// ─────────────────────────────────────────────
//  MAP TABS (Sidebar with Folder Support)
// ─────────────────────────────────────────────
function renderMapTabs() {
    const list = document.getElementById('map-tabs');
    list.innerHTML = '';
    
    if (!mapData.folders) mapData.folders = {};
    if (!mapData.folderOrder) mapData.folderOrder = Object.keys(mapData.folders);
    if (!mapData.mapOrder) mapData.mapOrder = Object.keys(mapData.maps);

    const createMapEl = (id, map) => {
        const item = document.createElement('button');
        item.className = 'map-tab' + (id === currentMapId ? ' active' : '');
        item.innerHTML = `<i class="fas fa-file-alt" style="font-size:10px;opacity:0.5;"></i> <span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(map.name)}</span>`;
        item.addEventListener('click', () => switchMap(id));
        return item;
    };

    const rootEl = document.createElement('div');
    rootEl.className = 'folder-root';
    rootEl.style.display = 'flex';
    rootEl.style.flexDirection = 'column';
    rootEl.style.gap = '2px';

    mapData.folderOrder.forEach(folderId => {
        const f = mapData.folders[folderId];
        if (!f) return;
        
        const folderEl = document.createElement('div');
        folderEl.style.marginBottom = '2px';
        
        const header = document.createElement('div');
        header.className = 'map-tab'; 
        header.style.fontWeight = '700';
        header.style.color = 'var(--text-color)';
        header.innerHTML = `<i class="fas fa-chevron-${f.expanded ? 'down' : 'right'}" style="width:14px;text-align:center;"></i> <span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(f.name)}</span>`;
        
        header.onclick = () => {
            f.expanded = !f.expanded;
            renderMapTabs();
        };
        folderEl.appendChild(header);

        if (f.expanded) {
            const children = document.createElement('div');
            children.style.display = 'flex';
            children.style.flexDirection = 'column';
            children.style.gap = '2px';
            children.style.paddingLeft = '14px';
            children.style.marginLeft = '7px';
            children.style.borderLeft = '1px dashed var(--border-color)';
            children.style.marginTop = '2px';
            
            mapData.mapOrder.forEach(mId => {
                const m = mapData.maps[mId];
                if (m && m.folderId === f.id) children.appendChild(createMapEl(mId, m));
            });
            folderEl.appendChild(children);
        }
        list.appendChild(folderEl);
    });

    mapData.mapOrder.forEach(mId => {
        const m = mapData.maps[mId];
        if (m && !m.folderId) rootEl.appendChild(createMapEl(mId, m));
    });
    list.appendChild(rootEl);
}

function renderBreadcrumbs() {
    const wrap = document.getElementById('breadcrumbs');
    wrap.innerHTML = '';
    
    let path = [];
    let curr = currentMapId;
    
    while (curr && mapData.maps[curr]) {
        path.unshift({ id: curr, name: mapData.maps[curr].name });
        curr = mapData.maps[curr].parentMapId;
    }
    
    if (path.length <= 1) return;
    
    path.forEach((step, index) => {
        const btn = document.createElement('button');
        btn.className = 'breadcrumb-btn';
        btn.textContent = step.name;
        btn.onclick = () => switchMap(step.id);
        wrap.appendChild(btn);
        
        if (index < path.length - 1) {
            const sep = document.createElement('i');
            sep.className = 'fas fa-chevron-right breadcrumb-sep';
            wrap.appendChild(sep);
        }
    });
}

function switchMap(id) {
    currentMapId = id;
    selectedNodeId = null;
    document.getElementById('info-panel').classList.add('hidden');
    renderMapTabs();
    renderNodes();
    redrawEdges();
    renderBreadcrumbs();
    hideMessage();
    setTimeout(fitView, 50);
    setTimeout(postRenderInit, 100);
}

function currentMap() { return mapData.maps[currentMapId]; }

// ─────────────────────────────────────────────
//  RENDER NODES
// ─────────────────────────────────────────────
function renderNodes() {
    const layer = document.getElementById('nodes-layer');
    layer.innerHTML = '';
    const isDark = document.body.classList.contains('dark-mode');
    const map = currentMap();
    if (!map) return;

    Object.values(map.nodes).forEach(node => {
        let defaultBorder = '#007bff';
        let defaultBg = '#e8f4ff';
        if (isDark) {
            defaultBorder = '#1e90ff';
            defaultBg = '#1a2d40';
        }
        
        let borderColor = node.borderColor;
        let bgColor = node.fillColor;
        
        if (!borderColor && node.color) {
            const c = COLORS[node.color];
            if (c) borderColor = isDark ? c.dark_border : c.border;
        }
        if (!bgColor && node.color) {
            const c = COLORS[node.color];
            if (c) bgColor = isDark ? c.dark_bg : c.bg;
        }
        
        borderColor = borderColor || defaultBorder;
        bgColor = bgColor || defaultBg;

        const borderWidth = node.borderWidth || 2;
        const borderStyle = node.borderDash || 'solid';
        const shape = node.shape || 'rectangle';
        const fontSize = node.fontSize || 13;
        const fontFamily = node.fontFamily || 'Roboto';
        const fontColor = node.fontColor || borderColor;
        const descFontSize = node.descFontSize || 10;
        const descFontFamily = node.descFontFamily || 'Roboto';
        const descFontColor = node.descFontColor || fontColor;

        const el = document.createElement('div');
        el.className = 'node' + (node.id === selectedNodeId ? ' selected' : '');
        
        if (node.isRegion) {
            el.classList.add('region');
        }

        el.id = 'node-' + node.id;
        el.style.left = node.x + 'px';
        el.style.top = node.y + 'px';
        el.style.width = (node.width || 150) + 'px';
        el.style.minHeight = (node.height || 60) + 'px';
        el.style.borderColor = borderColor;
        el.style.borderWidth = borderWidth + 'px';
        if (borderStyle !== 'solid') el.style.borderStyle = borderStyle;
        el.style.background = bgColor;
        el.style.boxShadow = `0 2px 12px ${borderColor}33`;
        el.style.fontFamily = fontFamily;
        el.style.fontSize = fontSize + 'px';
        el.style.color = fontColor;

        if (node.subMapId) el.style.borderWidth = '4px';

        if (shape === 'rounded') el.style.borderRadius = '8px';
        else if (shape === 'circle') el.style.borderRadius = '50%';
        else if (shape === 'diamond') {
            el.style.transform = 'rotate(45deg)';
            el.style.display = 'flex';
            el.style.alignItems = 'center';
            el.style.justifyContent = 'center';
            el.style.flexDirection = 'column';
        }

        const tags = (node.tags || '').split(',').map(t => t.trim()).filter(Boolean);

        let titleStyle = `color:${fontColor};font-size:${fontSize}px`;
        if (node.fontBold) titleStyle += ';font-weight:700';
        if (node.fontItalic) titleStyle += ';font-style:italic';
        if (node.fontUnderline) titleStyle += ';text-decoration:underline';

        let titleContent = escHtml(node.title);
        if (node.titleHighlight) {
            titleContent = `<span style="background-color:${node.titleHighlight};padding:2px 4px;border-radius:2px;display:inline-block">${titleContent}</span>`;
        }

        let descStyle = `color:${descFontColor};font-family:${descFontFamily};font-size:${descFontSize}px;${!node.desc ? 'display:none;' : ''}`;
        if (node.descFontBold) descStyle += ';font-weight:700';
        if (node.descFontItalic) descStyle += ';font-style:italic';
        if (node.descFontUnderline) descStyle += ';text-decoration:underline';

        let descContent = renderMarkdown(node.desc, node.id);
        if (node.desc && node.descHighlight) {
            descContent = `<div style="background-color:${node.descHighlight};padding:2px 4px;border-radius:2px;height:100%;">${descContent}</div>`;
        }

        el.innerHTML = `
            ${node.subMapId ? `<div class="node-submap-badge" title="Open Sub-Map"><i class="fas fa-sitemap"></i></div>` : ''}
            <div class="node-title" data-field="title" style="${titleStyle}">${titleContent}</div>
            <div class="node-desc" data-field="desc" style="${descStyle}">${descContent}</div>
            ${tags.length ? `<div class="node-tags">${tags.map(t => `<span class="node-tag" style="background:${borderColor}22;color:${borderColor}">${escHtml(t)}</span>`).join('')}</div>` : ''}
        `;

        if (shape === 'diamond') {
            const titleEl = el.querySelector('[data-field="title"]');
            const descEl = el.querySelector('[data-field="desc"]');
            if (titleEl) titleEl.style.transform = 'rotate(-45deg)';
            if (descEl) descEl.style.transform = 'rotate(-45deg)';
        }

        const submapBadge = el.querySelector('.node-submap-badge');
        if (submapBadge) {
            submapBadge.addEventListener('click', e => {
                e.stopPropagation();
                if (mapData.maps[node.subMapId]) {
                    switchMap(node.subMapId);
                }
            });
        }

        el.addEventListener('dblclick', e => {
            e.stopPropagation();
            if (node.subMapId && mapData.maps[node.subMapId]) {
                switchMap(node.subMapId);
            }
        });

        el.addEventListener('click', e => { e.stopPropagation(); selectNode(node.id); });
        layer.appendChild(el);
    });
}

// ─────────────────────────────────────────────
//  EDGES
// ─────────────────────────────────────────────
function nodeCenter(nodeId) {
    const el = document.getElementById('node-' + nodeId);
    if (!el) return null;
    const x = parseFloat(el.style.left) + el.offsetWidth / 2;
    const y = parseFloat(el.style.top) + el.offsetHeight / 2;
    return { x: x * transform.scale + transform.x, y: y * transform.scale + transform.y };
}

function getNodeEdgePoint(nodeId, directionVec, attach) {
    const el = document.getElementById('node-' + nodeId);
    if (!el) return null;
    
    const cx = parseFloat(el.style.left) + el.offsetWidth / 2;
    const cy = parseFloat(el.style.top) + el.offsetHeight / 2;
    const hw = el.offsetWidth / 2;
    const hh = el.offsetHeight / 2;
    
    if (attach && attach !== 'auto') {
        let x = cx, y = cy;
        if (attach === 'left') x = cx - hw;
        else if (attach === 'right') x = cx + hw;
        else if (attach === 'top') y = cy - hh;
        else if (attach === 'bottom') y = cy + hh;
        return { 
            x: x * transform.scale + transform.x, 
            y: y * transform.scale + transform.y 
        };
    }
    
    const len = Math.sqrt(directionVec.x * directionVec.x + directionVec.y * directionVec.y);
    if (len === 0) return nodeCenter(nodeId);
    const dx = directionVec.x / len;
    const dy = directionVec.y / len;
    
    let t;
    if (Math.abs(dx) > 0 && Math.abs(dy) > 0) {
        const tx = Math.abs(hw / dx);
        const ty = Math.abs(hh / dy);
        t = Math.min(tx, ty);
    } else if (Math.abs(dx) > 0) {
        t = Math.abs(hw / dx);
    } else {
        t = Math.abs(hh / dy);
    }
    
    const x = cx + dx * t;
    const y = cy + dy * t;
    
    return { 
        x: x * transform.scale + transform.x, 
        y: y * transform.scale + transform.y 
    };
}

function redrawEdges() {
    const layer = document.getElementById('edges-layer');
    layer.innerHTML = '';
    
    const svgDefs = document.getElementById('svg-defs');
    svgDefs.innerHTML = ''; 

    const isDark = document.body.classList.contains('dark-mode');
    const defaultCol = isDark ? '#555' : '#adb5bd';
    const selCol     = isDark ? '#1e90ff' : '#007bff';

    const map = currentMap();
    if (!map) return;

    map.edges.forEach(edge => {
        const centerA = nodeCenter(edge.from), centerB = nodeCenter(edge.to);
        if (!centerA || !centerB) return;
        
        const edgeDir = { x: centerB.x - centerA.x, y: centerB.y - centerA.y };
        const oppositeDir = { x: -edgeDir.x, y: -edgeDir.y };
        
        const a = getNodeEdgePoint(edge.from, edgeDir, edge.fromAttach);
        const b = getNodeEdgePoint(edge.to, oppositeDir, edge.toAttach);
        if (!a || !b) return;
        
        const isSel = selectedNodeId === edge.from || selectedNodeId === edge.to;

        const edgeColor = edge.color || defaultCol;
        const strokeCol = isSel ? selCol : edgeColor;
        const strokeW   = parseFloat(edge.thickness || '2');
        const dashArr   = DASH_MAP[edge.dash || 'solid'] || 'none';

        let fromType  = edge.fromType || 'none';
        let toType    = edge.toType || 'arrow';
        let fromFilled = edge.fromFilled !== false;
        let toFilled   = edge.toFilled !== false;

        if (edge.type === 'bidirectional') { fromType = 'arrow'; toType = 'arrow'; }
        else if (edge.type === 'diamond') { toType = 'diamond'; }
        else if (edge.type === 'square') { toType = 'square'; }
        else if (edge.type === 'circle') { toType = 'circle'; }
        else if (edge.type === 'line' || edge.type === 'none') { toType = 'none'; }

        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 30;
        const d  = `M${a.x},${a.y} Q${mx},${my} ${b.x},${b.y}`;

        const safeId = edge.id.replace(/[^a-z0-9_]/gi, '_');
        const mkId   = `mk_${safeId}`;
        let endMarkerUrl = 'none';
        let startMarkerUrl = 'none';

        if (fromType !== 'none') {
            const startMk = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            startMk.setAttribute('id', mkId + '_start');
            startMk.setAttribute('orient', 'auto');

            if (fromType === 'arrow') {
                startMk.setAttribute('markerWidth', '8');
                startMk.setAttribute('markerHeight', '7');
                startMk.setAttribute('refX', '-2');
                startMk.setAttribute('refY', '3.5');
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                poly.setAttribute('points', '8 0, 0 3.5, 8 7');
                if (fromFilled) poly.setAttribute('fill', strokeCol);
                else { poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', strokeCol); poly.setAttribute('stroke-width', '1'); }
                startMk.appendChild(poly);
            } else if (fromType === 'circle') {
                startMk.setAttribute('markerWidth', '12');
                startMk.setAttribute('markerHeight', '10');
                startMk.setAttribute('refX', '-4');
                startMk.setAttribute('refY', '5');
                const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circ.setAttribute('cx', '2'); circ.setAttribute('cy', '5'); circ.setAttribute('r', '3');
                if (fromFilled) circ.setAttribute('fill', strokeCol);
                else { circ.setAttribute('fill', 'none'); circ.setAttribute('stroke', strokeCol); circ.setAttribute('stroke-width', '1'); }
                startMk.appendChild(circ);
            } else if (fromType === 'square') {
                startMk.setAttribute('markerWidth', '12');
                startMk.setAttribute('markerHeight', '10');
                startMk.setAttribute('refX', '-4');
                startMk.setAttribute('refY', '5');
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', '-1'); rect.setAttribute('y', '2'); rect.setAttribute('width', '4'); rect.setAttribute('height', '6');
                if (fromFilled) rect.setAttribute('fill', strokeCol);
                else { rect.setAttribute('fill', 'none'); rect.setAttribute('stroke', strokeCol); rect.setAttribute('stroke-width', '1'); }
                startMk.appendChild(rect);
            } else if (fromType === 'diamond') {
                startMk.setAttribute('markerWidth', '12');
                startMk.setAttribute('markerHeight', '10');
                startMk.setAttribute('refX', '-4');
                startMk.setAttribute('refY', '5');
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                poly.setAttribute('points', '4 0, 0 5, 4 10, 2 5');
                if (fromFilled) poly.setAttribute('fill', strokeCol);
                else { poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', strokeCol); poly.setAttribute('stroke-width', '1'); }
                startMk.appendChild(poly);
            }
            svgDefs.appendChild(startMk);
            startMarkerUrl = `url(#${mkId}_start)`;
        }

        if (toType !== 'none') {
            const endMk = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            endMk.setAttribute('id', mkId + '_end');
            endMk.setAttribute('orient', 'auto');

            if (toType === 'arrow') {
                endMk.setAttribute('markerWidth', '10');
                endMk.setAttribute('markerHeight', '10');
                endMk.setAttribute('refX', '8');
                endMk.setAttribute('refY', '3.5');
                endMk.setAttribute('markerHeight', '7');
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                poly.setAttribute('points', '0 0, 8 3.5, 0 7');
                if (toFilled) poly.setAttribute('fill', strokeCol);
                else { poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', strokeCol); poly.setAttribute('stroke-width', '1'); }
                endMk.appendChild(poly);
            } else if (toType === 'circle') {
                endMk.setAttribute('markerWidth', '12');
                endMk.setAttribute('markerHeight', '10');
                endMk.setAttribute('refX', '10');
                endMk.setAttribute('refY', '5');
                const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circ.setAttribute('cx', '6'); circ.setAttribute('cy', '5'); circ.setAttribute('r', '3');
                if (toFilled) circ.setAttribute('fill', strokeCol);
                else { circ.setAttribute('fill', 'none'); circ.setAttribute('stroke', strokeCol); circ.setAttribute('stroke-width', '1'); }
                endMk.appendChild(circ);
            } else if (toType === 'square') {
                endMk.setAttribute('markerWidth', '12');
                endMk.setAttribute('markerHeight', '10');
                endMk.setAttribute('refX', '13');
                endMk.setAttribute('refY', '5');
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', '7'); rect.setAttribute('y', '2'); rect.setAttribute('width', '4'); rect.setAttribute('height', '6');
                if (toFilled) rect.setAttribute('fill', strokeCol);
                else { rect.setAttribute('fill', 'none'); rect.setAttribute('stroke', strokeCol); rect.setAttribute('stroke-width', '1'); }
                endMk.appendChild(rect);
            } else if (toType === 'diamond') {
                endMk.setAttribute('markerWidth', '12');
                endMk.setAttribute('markerHeight', '10');
                endMk.setAttribute('refX', '12');
                endMk.setAttribute('refY', '5');
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                poly.setAttribute('points', '8 0, 12 5, 8 10, 10 5');
                if (toFilled) poly.setAttribute('fill', strokeCol);
                else { poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', strokeCol); poly.setAttribute('stroke-width', '1'); }
                endMk.appendChild(poly);
            }
            svgDefs.appendChild(endMk);
            endMarkerUrl = `url(#${mkId}_end)`;
        }

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', strokeCol);
        path.setAttribute('stroke-width', strokeW);
        if (dashArr !== 'none') path.setAttribute('stroke-dasharray', dashArr);
        if (endMarkerUrl !== 'none')   path.setAttribute('marker-end',   endMarkerUrl);
        if (startMarkerUrl !== 'none') path.setAttribute('marker-start', startMarkerUrl);
        
        layer.appendChild(path);
        
        if (edge.label && edge.label.trim()) {
            const labelX = (a.x + b.x) / 2 + (edge.labelOffsetX || 0);
            const labelY = (a.y + b.y) / 2 + (edge.labelOffsetY !== undefined ? edge.labelOffsetY : -34);
            
            const labelFontSize = edge.labelFontSize || 11;
            const labelFontFamily = edge.labelFontFamily || 'Roboto';
            const labelFontColor = edge.labelFontColor || strokeCol;
            
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', labelX);
            text.setAttribute('y', labelY);
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('font-size', labelFontSize);
            text.setAttribute('font-family', labelFontFamily + ',sans-serif');
            text.setAttribute('fill', labelFontColor);
            if (edge.labelFontBold) text.setAttribute('font-weight', '700');
            if (edge.labelFontItalic) text.setAttribute('font-style', 'italic');
            if (edge.labelFontUnderline) text.setAttribute('text-decoration', 'underline');
            text.style.pointerEvents = 'none';
            
            text.textContent = edge.label;
            layer.appendChild(text);
        }
    });
}

// ─────────────────────────────────────────────
//  SELECT / INFO PANEL
// ─────────────────────────────────────────────
function selectNode(nodeId) {
    selectedNodeId = nodeId;
    document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
    if (nodeId) document.getElementById('node-' + nodeId)?.classList.add('selected');
    redrawEdges();
    renderInfoPanel();
    postRenderInit();
}

function renderInfoPanel() {
    const panel = document.getElementById('info-panel');
    if (!selectedNodeId) { panel.classList.add('hidden'); return; }

    const map = currentMap();
    const node = map.nodes[selectedNodeId];
    if (!node) { panel.classList.add('hidden'); return; }

    panel.classList.remove('hidden');
    const isDark = document.body.classList.contains('dark-mode');
    
    let col = node.borderColor;
    if (!col && node.color) {
        const c = COLORS[node.color];
        if (c) col = isDark ? c.dark_border : c.border;
    }
    col = col || (isDark ? '#1e90ff' : '#007bff');

    document.getElementById('info-title').textContent = node.title;
    document.getElementById('info-title').style.color = col;

    // tags
    const tagsEl = document.getElementById('info-tags');
    const tags = (node.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    tagsEl.innerHTML = tags.map(t =>
        `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${col}22;color:${col}">${escHtml(t)}</span>`
    ).join('');

    // description
    const descSec = document.getElementById('info-desc-section');
    if (node.desc && node.desc.trim()) {
        descSec.style.display = 'block';
        document.getElementById('info-desc').innerHTML = renderMarkdown(node.desc, node.id);
    } else { descSec.style.display = 'none'; }

    // links
    const linkSec = document.getElementById('info-links-section');
    const links = node.links || [];
    if (links.length) {
        linkSec.style.display = 'block';
        document.getElementById('info-links').innerHTML = links.map(lnk => {
            const label = lnk.replace(/^https?:\/\//, '').substring(0, 45);
            return `<a class="info-link" href="${escAttr(lnk)}" target="_blank" rel="noopener">
                <i class="fas fa-external-link-alt" style="font-size:10px;opacity:0.6;flex-shrink:0"></i>
                <span>${escHtml(label)}</span>
            </a>`;
        }).join('');
    } else { linkSec.style.display = 'none'; }

    // files
    const fileSec = document.getElementById('info-files-section');
    const files = node.files || [];
    if (files.length) {
        fileSec.style.display = 'block';
        document.getElementById('info-files').innerHTML = files.map(f =>
            `<div class="info-file">
                <i class="fas fa-file" style="font-size:10px;opacity:0.5;flex-shrink:0"></i>
                <a href="${escAttr(f)}" target="_blank" style="color:var(--primary-color);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(f)}</a>
            </div>`
        ).join('');
    } else { fileSec.style.display = 'none'; }

    // connections
    const connSec = document.getElementById('info-conn-section');
    const conns = map.edges.filter(e => e.from === selectedNodeId || e.to === selectedNodeId);
    if (conns.length) {
        connSec.style.display = 'block';
        document.getElementById('info-connections').innerHTML = conns.map(edge => {
            const otherId = edge.from === selectedNodeId ? edge.to : edge.from;
            const other = map.nodes[otherId];
            if (!other) return '';
            
            let ocol = other.borderColor;
            if (!ocol && other.color) {
                const oc = COLORS[other.color];
                if (oc) ocol = isDark ? oc.dark_border : oc.border;
            }
            ocol = ocol || (isDark ? '#1e90ff' : '#007bff');
            
            return `<button class="info-conn" onclick="selectNode('${otherId}')"
                style="color:${ocol};background:${ocol}18;border:none">
                <i class="fas fa-circle" style="font-size:7px"></i>
                ${escHtml(other.title)}
            </button>`;
        }).join('');
    } else { connSec.style.display = 'none'; }
}

// ─────────────────────────────────────────────
//  TRANSFORM / ZOOM / PAN
// ─────────────────────────────────────────────
function applyTransform() {
    document.getElementById('nodes-layer').style.transform =
        `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
    redrawEdges();
}

function zoom(factor) {
    const wrap = document.getElementById('canvas-wrap');
    const cx = wrap.clientWidth / 2, cy = wrap.clientHeight / 2;
    transform.x = cx - (cx - transform.x) * factor;
    transform.y = cy - (cy - transform.y) * factor;
    transform.scale *= factor;
    applyTransform();
}

function fitView() {
    const map = currentMap();
    if (!map) return;
    const nodes = Object.values(map.nodes);
    if (!nodes.length) return;
    const wrap = document.getElementById('canvas-wrap');
    const pad = 80;
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + 220;
    const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + 80;
    const s = Math.min(wrap.clientWidth / (maxX - minX), wrap.clientHeight / (maxY - minY), 1.5);
    transform.scale = s;
    transform.x = (wrap.clientWidth  - (maxX + minX) * s) / 2;
    transform.y = (wrap.clientHeight - (maxY + minY) * s) / 2;
    applyTransform();
}

// pan with drag
const wrap = document.getElementById('canvas-wrap');
let panning = false, panStart = {x:0,y:0}, panOrig = {x:0,y:0};

wrap.addEventListener('mousedown', e => {
    if (e.target !== wrap && e.target.id !== 'canvas-svg' && e.target.id !== 'nodes-layer' && !e.target.closest('#edges-layer')) return;
    panning = true;
    panStart = {x: e.clientX, y: e.clientY};
    panOrig  = {x: transform.x, y: transform.y};
    wrap.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
    if (!panning) return;
    transform.x = panOrig.x + (e.clientX - panStart.x);
    transform.y = panOrig.y + (e.clientY - panStart.y);
    applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; wrap.style.cursor = 'default'; });

wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.08 : 0.93;
    const rect = wrap.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    transform.x = cx - (cx - transform.x) * factor;
    transform.y = cy - (cy - transform.y) * factor;
    transform.scale *= factor;
    applyTransform();
}, {passive: false});

// click canvas bg to deselect
wrap.addEventListener('click', e => {
    if (e.target === wrap || e.target.id === 'canvas-svg' || e.target === document.getElementById('nodes-layer')) {
        selectNode(null);
    }
});

// ─────────────────────────────────────────────
//  THEME TOGGLE
// ─────────────────────────────────────────────
const themeToggle = document.getElementById('theme-toggle');
const sunIcon  = document.getElementById('sun-icon');
const moonIcon = document.getElementById('moon-icon');

if ((localStorage.getItem('theme') || 'light') === 'dark') {
    document.body.classList.add('dark-mode');
    sunIcon.style.display  = 'none';
    moonIcon.style.display = 'inline-block';
}

themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    sunIcon.style.display  = isDark ? 'none'         : 'inline-block';
    moonIcon.style.display = isDark ? 'inline-block' : 'none';
    if (mapData) { renderNodes(); redrawEdges(); renderInfoPanel(); postRenderInit(); }
});

window.addEventListener('resize', redrawEdges);

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadData();
</script>
