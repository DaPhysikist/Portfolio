<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav Mehta - My Maps</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --card-bg: #fff;
            --border-color: #ddd;
            --primary-color: #007bff;
            --link-hover: #0056b3;
            --shadow-light: 0 4px 12px rgba(0,0,0,0.08);
            --node-shadow: 0 2px 10px rgba(0,123,255,0.18);
            --toolbar-bg: #ffffff;
            --sidebar-bg: #ffffff;
        }
        .dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f4f4f4;
            --card-bg: #2b2b2b;
            --border-color: #444;
            --primary-color: #1e90ff;
            --link-hover: #4dabff;
            --shadow-light: 0 4px 12px rgba(0,0,0,0.4);
            --node-shadow: 0 2px 10px rgba(30,144,255,0.2);
            --toolbar-bg: #232323;
            --sidebar-bg: #232323;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            background-color: var(--card-bg);
            box-shadow: var(--shadow-light);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            z-index: 100;
        }
        .main-nav { display: flex; align-items: center; gap: 1rem; }
        .header-icon { width: 36px; height: 36px; border-radius: 50%; }
        .nav-link { text-decoration: none; color: var(--text-color); font-weight: 700; transition: color 0.3s; }
        .nav-link:hover { color: var(--primary-color); }
        #theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-color); }
        #theme-toggle:hover { color: var(--primary-color); }

        /* ── Layout ── */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Map tabs sidebar ── */
        .map-sidebar {
            width: 200px;
            flex-shrink: 0;
            background: var(--toolbar-bg);
            border-right: 1px solid var(--border-color);
            padding: 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin: 0 0 0.5rem;
        }
        .map-tab {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            transition: background 0.15s, color 0.15s;
            text-align: left;
            width: 100%;
        }
        .map-tab:hover { background: var(--bg-color); }
        .map-tab.active { background: rgba(0,123,255,0.1); color: var(--primary-color); font-weight: 700; }
        .map-tab i { font-size: 10px; opacity: 0.5; }

        /* ── Canvas ── */
        .canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-color);
            background-image: radial-gradient(circle, var(--border-color) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        #canvas-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #nodes-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: 0 0;
        }

        /* ── Node ── */
        .node {
            position: absolute;
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 10px 14px;
            min-width: 130px;
            max-width: 210px;
            cursor: pointer;
            user-select: none;
            transition: box-shadow 0.15s, transform 0.1s;
            z-index: 2;
        }
        .node:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .node.selected { box-shadow: 0 0 0 3px rgba(0,123,255,0.3); }
        .node-title { font-weight: 700; font-size: 13px; margin: 0 0 2px; }
        .node-desc {
            font-size: 11px; color: #888; margin: 0;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .dark-mode .node-desc { color: #aaa; }
        .node-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
        .node-tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; }

        /* ── Info panel ── */
        .info-panel {
            width: 290px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .info-panel.hidden { display: none; }
        .info-header {
            padding: 1.25rem 1rem 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }
        .info-header h2 { margin: 0; font-size: 16px; font-weight: 700; }
        .info-header .info-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .info-body { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .info-section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #888;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .info-desc {
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--text-color);
        }
        .info-links { display: flex; flex-direction: column; gap: 5px; }
        .info-link {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 7px;
            background: var(--bg-color);
            text-decoration: none;
            color: var(--primary-color);
            font-size: 12px;
            transition: background 0.15s;
            overflow: hidden;
        }
        .info-link:hover { background: rgba(0,123,255,0.08); }
        .info-link span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info-files { display: flex; flex-direction: column; gap: 5px; }
        .info-file {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 7px;
            background: var(--bg-color);
            font-size: 12px;
        }
        .info-connections { display: flex; flex-direction: column; gap: 5px; }
        .info-conn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-family: 'Roboto', sans-serif;
            transition: background 0.15s;
        }
        .info-conn i { font-size: 8px; }

        /* ── Zoom controls ── */
        .zoom-controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 50;
        }
        .zoom-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .zoom-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        /* ── Loading / empty states ── */
        .center-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #aaa;
            pointer-events: none;
        }
        .center-message i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.4; }
        .center-message p { font-size: 13px; margin: 0; }
        .center-message a { color: var(--primary-color); pointer-events: all; }

        /* ── View-only badge ── */
        .view-badge {
            position: absolute;
            top: 12px; left: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #888;
            z-index: 50;
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="main-header">
    <a href="/" class="header-icon-link">
        <img src="/android-chrome-512x512.png" alt="Pranav Mehta Logo" class="header-icon">
    </a>
    <nav class="main-nav">
        <a href="materials.html" class="nav-link">Materials</a>
        <a href="my-maps.html" class="nav-link" style="color: var(--primary-color)">My Maps</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <a href="concept-map.html" class="nav-link">Map Editor</a>
        <button id="theme-toggle" aria-label="Toggle dark mode">
            <i class="fas fa-sun" id="sun-icon"></i>
            <i class="fas fa-moon" id="moon-icon" style="display:none;"></i>
        </button>
    </nav>
</header>

<!-- ── APP BODY ── -->
<div class="app-body">

    <!-- Map list sidebar -->
    <aside class="map-sidebar" id="map-sidebar">
        <div class="sidebar-title">Maps</div>
        <div id="map-tabs"></div>
    </aside>

    <!-- Canvas -->
    <div class="canvas-wrap" id="canvas-wrap">
        <svg id="canvas-svg" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrowhead" markerWidth="8" markerHeight="7"
                        refX="7" refY="3.5" orient="auto">
                    <polygon id="ah-poly" points="0 0, 8 3.5, 0 7"/>
                </marker>
                <marker id="arrowhead-sel" markerWidth="8" markerHeight="7"
                        refX="7" refY="3.5" orient="auto">
                    <polygon points="0 0, 8 3.5, 0 7" style="fill:#007bff"/>
                </marker>
            </defs>
            <g id="edges-layer"></g>
        </svg>
        <div id="nodes-layer"></div>
        <div class="view-badge"><i class="fas fa-eye"></i> View only</div>
        <div class="center-message" id="center-msg" style="display:none">
            <i class="fas fa-map"></i>
            <p id="center-msg-text"></p>
        </div>
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoom(1.15)"><i class="fas fa-plus"></i></button>
            <button class="zoom-btn" onclick="zoom(0.87)"><i class="fas fa-minus"></i></button>
            <button class="zoom-btn" onclick="fitView()"><i class="fas fa-crosshairs"></i></button>
        </div>
    </div>

    <!-- Info panel (shown when a node is selected) -->
    <aside class="info-panel hidden" id="info-panel">
        <div class="info-header">
            <h2 id="info-title"></h2>
            <div class="info-tags" id="info-tags"></div>
        </div>
        <div class="info-body">
            <div id="info-desc-section" style="display:none">
                <div class="info-section-label">Notes</div>
                <div class="info-desc" id="info-desc"></div>
            </div>
            <div id="info-links-section" style="display:none">
                <div class="info-section-label">Links</div>
                <div class="info-links" id="info-links"></div>
            </div>
            <div id="info-files-section" style="display:none">
                <div class="info-section-label">Files</div>
                <div class="info-files" id="info-files"></div>
            </div>
            <div id="info-conn-section" style="display:none">
                <div class="info-section-label">Connected concepts</div>
                <div class="info-connections" id="info-connections"></div>
            </div>
        </div>
    </aside>
</div>

<script>
// ─────────────────────────────────────────────
//  COLORS (must match editor)
// ─────────────────────────────────────────────
const COLORS = {
    blue:   { border: '#007bff', bg: '#e8f4ff', dark_border: '#1e90ff', dark_bg: '#1a2d40' },
    green:  { border: '#28a745', bg: '#e8f9ed', dark_border: '#2fba54', dark_bg: '#1a2e1e' },
    orange: { border: '#fd7e14', bg: '#fff3e0', dark_border: '#ff9a3c', dark_bg: '#2e1f0a' },
    red:    { border: '#e74c3c', bg: '#fdecea', dark_border: '#e74c3c', dark_bg: '#2e1212' },
    purple: { border: '#6f42c1', bg: '#f0ebff', dark_border: '#9b72e8', dark_bg: '#221840' },
    teal:   { border: '#20c997', bg: '#e0faf3', dark_border: '#20c997', dark_bg: '#102d25' },
    gray:   { border: '#6c757d', bg: '#f3f4f5', dark_border: '#9aa0a6', dark_bg: '#252525' },
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let mapData = null;        // full map-data.json contents
let currentMapId = null;
let selectedNodeId = null;
let transform = { x: 0, y: 0, scale: 1 };

// ─────────────────────────────────────────────
//  LOAD
// ─────────────────────────────────────────────
async function loadData() {
    showMessage('<i class="fas fa-spinner fa-spin"></i>', 'Loading maps…');
    try {
        const res = await fetch('map-data.json?_=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const raw = await res.json();

        // Support both full state format and single-map format
        if (raw.maps) {
            mapData = raw;
        } else if (raw.nodes && raw.edges) {
            const id = 'map_default';
            mapData = { maps: { [id]: { name: raw.name || 'My Concepts', nodes: raw.nodes, edges: raw.edges } } };
        } else {
            throw new Error('unrecognized format');
        }

        const ids = Object.keys(mapData.maps);
        if (!ids.length) throw new Error('empty');
        renderMapTabs();
        switchMap(ids[0]);
    } catch(e) {
        hideMessage();
        showMessage('fas fa-map', `No maps published yet.`);
    }
}

function showMessage(icon, text) {
    const el = document.getElementById('center-msg');
    el.style.display = 'block';
    el.innerHTML = `<i class="${icon}" style="font-size:2.5rem;display:block;margin-bottom:0.5rem;opacity:0.4"></i><p style="font-size:13px;margin:0">${text}</p>`;
}
function hideMessage() { document.getElementById('center-msg').style.display = 'none'; }

// ─────────────────────────────────────────────
//  MAP TABS
// ─────────────────────────────────────────────
function renderMapTabs() {
    const tabs = document.getElementById('map-tabs');
    tabs.innerHTML = '';
    Object.entries(mapData.maps).forEach(([id, map]) => {
        const btn = document.createElement('button');
        btn.className = 'map-tab' + (id === currentMapId ? ' active' : '');
        btn.innerHTML = `<i class="fas fa-circle"></i> ${escHtml(map.name)}`;
        btn.addEventListener('click', () => switchMap(id));
        tabs.appendChild(btn);
    });
}

function switchMap(id) {
    currentMapId = id;
    selectedNodeId = null;
    document.getElementById('info-panel').classList.add('hidden');
    renderMapTabs();
    renderNodes();
    redrawEdges();
    hideMessage();
    setTimeout(fitView, 50);
}

function currentMap() { return mapData.maps[currentMapId]; }

// ─────────────────────────────────────────────
//  RENDER NODES
// ─────────────────────────────────────────────
function renderNodes() {
    const layer = document.getElementById('nodes-layer');
    layer.innerHTML = '';
    const isDark = document.body.classList.contains('dark-mode');
    const map = currentMap();
    if (!map) return;

    Object.values(map.nodes).forEach(node => {
        const c = COLORS[node.color || 'blue'];
        const border = isDark ? c.dark_border : c.border;
        const bg     = isDark ? c.dark_bg     : c.bg;
        const tags = (node.tags || '').split(',').map(t => t.trim()).filter(Boolean);

        const el = document.createElement('div');
        el.className = 'node' + (node.id === selectedNodeId ? ' selected' : '');
        el.id = 'node-' + node.id;
        el.style.left = node.x + 'px';
        el.style.top  = node.y + 'px';
        el.style.borderColor = border;
        el.style.background  = bg;
        el.style.boxShadow   = `0 2px 12px ${border}33`;

        el.innerHTML = `
            <div class="node-title" style="color:${border}">${escHtml(node.title)}</div>
            ${node.desc ? `<p class="node-desc">${escHtml(node.desc)}</p>` : ''}
            ${tags.length ? `<div class="node-tags">${tags.map(t =>
                `<span class="node-tag" style="background:${border}22;color:${border}">${escHtml(t)}</span>`
            ).join('')}</div>` : ''}
        `;
        el.addEventListener('click', e => { e.stopPropagation(); selectNode(node.id); });
        layer.appendChild(el);
    });
}

// ─────────────────────────────────────────────
//  EDGES
// ─────────────────────────────────────────────
function nodeCenter(nodeId) {
    const el = document.getElementById('node-' + nodeId);
    if (!el) return null;
    return {
        x: (parseFloat(el.style.left) + el.offsetWidth  / 2) * transform.scale + transform.x,
        y: (parseFloat(el.style.top)  + el.offsetHeight / 2) * transform.scale + transform.y,
    };
}

function redrawEdges() {
    const layer = document.getElementById('edges-layer');
    layer.innerHTML = '';
    const isDark = document.body.classList.contains('dark-mode');
    const edgeCol = isDark ? '#555' : '#adb5bd';
    document.getElementById('ah-poly').style.fill = edgeCol;

    const map = currentMap();
    if (!map) return;

    map.edges.forEach(edge => {
        const a = nodeCenter(edge.from), b = nodeCenter(edge.to);
        if (!a || !b) return;
        const isSel = selectedNodeId === edge.from || selectedNodeId === edge.to;
        const col = isSel ? (isDark ? '#1e90ff' : '#007bff') : edgeCol;
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 30;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M${a.x},${a.y} Q${mx},${my} ${b.x},${b.y}`);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', col);
        path.setAttribute('stroke-width', isSel ? 2.5 : 1.8);
        path.setAttribute('marker-end', isSel ? 'url(#arrowhead-sel)' : 'url(#arrowhead)');
        layer.appendChild(path);
    });
}

// ─────────────────────────────────────────────
//  SELECT / INFO PANEL
// ─────────────────────────────────────────────
function selectNode(nodeId) {
    selectedNodeId = nodeId;
    document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
    if (nodeId) document.getElementById('node-' + nodeId)?.classList.add('selected');
    redrawEdges();
    renderInfoPanel();
}

function renderInfoPanel() {
    const panel = document.getElementById('info-panel');
    if (!selectedNodeId) { panel.classList.add('hidden'); return; }

    const map = currentMap();
    const node = map.nodes[selectedNodeId];
    if (!node) { panel.classList.add('hidden'); return; }

    panel.classList.remove('hidden');
    const isDark = document.body.classList.contains('dark-mode');
    const c = COLORS[node.color || 'blue'];
    const col = isDark ? c.dark_border : c.border;

    document.getElementById('info-title').textContent = node.title;
    document.getElementById('info-title').style.color = col;

    // tags
    const tagsEl = document.getElementById('info-tags');
    const tags = (node.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    tagsEl.innerHTML = tags.map(t =>
        `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${col}22;color:${col}">${escHtml(t)}</span>`
    ).join('');

    // description
    const descSec = document.getElementById('info-desc-section');
    if (node.desc && node.desc.trim()) {
        descSec.style.display = 'block';
        document.getElementById('info-desc').textContent = node.desc;
    } else { descSec.style.display = 'none'; }

    // links
    const linkSec = document.getElementById('info-links-section');
    const links = node.links || [];
    if (links.length) {
        linkSec.style.display = 'block';
        document.getElementById('info-links').innerHTML = links.map(lnk => {
            const label = lnk.replace(/^https?:\/\//, '').substring(0, 45);
            return `<a class="info-link" href="${escAttr(lnk)}" target="_blank" rel="noopener">
                <i class="fas fa-external-link-alt" style="font-size:10px;opacity:0.6;flex-shrink:0"></i>
                <span>${escHtml(label)}</span>
            </a>`;
        }).join('');
    } else { linkSec.style.display = 'none'; }

    // files
    const fileSec = document.getElementById('info-files-section');
    const files = node.files || [];
    if (files.length) {
        fileSec.style.display = 'block';
        document.getElementById('info-files').innerHTML = files.map(f =>
            `<div class="info-file">
                <i class="fas fa-file" style="font-size:10px;opacity:0.5;flex-shrink:0"></i>
                <a href="${escAttr(f)}" target="_blank" style="color:var(--primary-color);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(f)}</a>
            </div>`
        ).join('');
    } else { fileSec.style.display = 'none'; }

    // connections
    const connSec = document.getElementById('info-conn-section');
    const conns = map.edges.filter(e => e.from === selectedNodeId || e.to === selectedNodeId);
    if (conns.length) {
        connSec.style.display = 'block';
        document.getElementById('info-connections').innerHTML = conns.map(edge => {
            const otherId = edge.from === selectedNodeId ? edge.to : edge.from;
            const other = map.nodes[otherId];
            if (!other) return '';
            const oc = COLORS[other.color || 'blue'];
            const ocol = isDark ? oc.dark_border : oc.border;
            return `<button class="info-conn" onclick="selectNode('${otherId}')"
                style="color:${ocol};background:${ocol}18;border:none">
                <i class="fas fa-circle" style="font-size:7px"></i>
                ${escHtml(other.title)}
            </button>`;
        }).join('');
    } else { connSec.style.display = 'none'; }
}

// ─────────────────────────────────────────────
//  TRANSFORM / ZOOM / PAN
// ─────────────────────────────────────────────
function applyTransform() {
    document.getElementById('nodes-layer').style.transform =
        `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
    redrawEdges();
}

function zoom(factor) {
    const wrap = document.getElementById('canvas-wrap');
    const cx = wrap.clientWidth / 2, cy = wrap.clientHeight / 2;
    transform.x = cx - (cx - transform.x) * factor;
    transform.y = cy - (cy - transform.y) * factor;
    transform.scale *= factor;
    applyTransform();
}

function fitView() {
    const map = currentMap();
    if (!map) return;
    const nodes = Object.values(map.nodes);
    if (!nodes.length) return;
    const wrap = document.getElementById('canvas-wrap');
    const pad = 80;
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + 220;
    const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + 80;
    const s = Math.min(wrap.clientWidth / (maxX - minX), wrap.clientHeight / (maxY - minY), 1.5);
    transform.scale = s;
    transform.x = (wrap.clientWidth  - (maxX + minX) * s) / 2;
    transform.y = (wrap.clientHeight - (maxY + minY) * s) / 2;
    applyTransform();
}

// pan with drag
const wrap = document.getElementById('canvas-wrap');
let panning = false, panStart = {x:0,y:0}, panOrig = {x:0,y:0};

wrap.addEventListener('mousedown', e => {
    if (e.target !== wrap && e.target.id !== 'canvas-svg' && e.target.id !== 'nodes-layer' && !e.target.closest('#edges-layer')) return;
    panning = true;
    panStart = {x: e.clientX, y: e.clientY};
    panOrig  = {x: transform.x, y: transform.y};
    wrap.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
    if (!panning) return;
    transform.x = panOrig.x + (e.clientX - panStart.x);
    transform.y = panOrig.y + (e.clientY - panStart.y);
    applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; wrap.style.cursor = 'default'; });

wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.08 : 0.93;
    const rect = wrap.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    transform.x = cx - (cx - transform.x) * factor;
    transform.y = cy - (cy - transform.y) * factor;
    transform.scale *= factor;
    applyTransform();
}, {passive: false});

// click canvas bg to deselect
wrap.addEventListener('click', e => {
    if (e.target === wrap || e.target.id === 'canvas-svg' || e.target === document.getElementById('nodes-layer')) {
        selectNode(null);
    }
});

// ─────────────────────────────────────────────
//  THEME TOGGLE
// ─────────────────────────────────────────────
const themeToggle = document.getElementById('theme-toggle');
const sunIcon  = document.getElementById('sun-icon');
const moonIcon = document.getElementById('moon-icon');

if ((localStorage.getItem('theme') || 'light') === 'dark') {
    document.body.classList.add('dark-mode');
    sunIcon.style.display  = 'none';
    moonIcon.style.display = 'inline-block';
}

themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    sunIcon.style.display  = isDark ? 'none'         : 'inline-block';
    moonIcon.style.display = isDark ? 'inline-block' : 'none';
    if (mapData) { renderNodes(); redrawEdges(); renderInfoPanel(); }
});

window.addEventListener('resize', redrawEdges);

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadData();
</script>
